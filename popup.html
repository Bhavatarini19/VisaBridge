<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 270px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 13px;
      background: #fff;
      color: #111;
    }

    /* ── Header ── */
    .header {
      background: #a80559;   /* dark navy — distinct from LinkedIn blue */
      color: #fff;
      padding: 12px 16px 0;
    }
    .header h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2px;
      padding-bottom: 10px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: rgba(255,255,255,0.65);
      font-size: 12px;
      font-weight: 600;
      padding: 7px 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab-btn.active {
      color: #fff;
      border-bottom-color: #fff;
    }
    .tab-btn:hover { color: #fff; }

    /* ── Content areas ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Results tab ── */
    .results-body { padding: 8px 16px 4px; }

    .status {
      color: #888;
      font-size: 12px;
      text-align: center;
      padding: 16px 0;
    }

    .kw-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid #f3f3f3;
    }
    .kw-row:last-child { border-bottom: none; }
    .kw-row.zero { opacity: 0.3; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
    }
    .kw-count {
      font-weight: 800;
      font-size: 16px;
      min-width: 26px;
      text-align: right;
    }

    /* ── Keywords tab ── */
    .kw-manage { padding: 10px 16px; }

    .kw-manage-list { margin-bottom: 10px; }

    .kw-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid #f3f3f3;
    }
    .kw-item:last-child { border-bottom: none; }

    .kw-item-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
    }

    .kw-del-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      color: #999;
      font-size: 13px;
      line-height: 1;
      padding: 2px 6px;
      transition: all 0.15s;
    }
    .kw-del-btn:hover { background: #fee; color: #c00; border-color: #c00; }

    .add-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #eee;
    }
    .add-row input {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      outline: none;
    }
    .add-row input:focus { border-color: #a80559; }
    .add-row button {
      background: #a80559;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .add-row button:hover { background: #162d4a; }

    .add-hint {
      font-size: 10px;
      color: #aaa;
      margin-top: 5px;
    }

    .error-msg {
      color: #c00;
      font-size: 11px;
      margin-top: 4px;
      min-height: 14px;
    }

    /* ── Footer ── */
    .footer {
      background: #f7f7f7;
      border-top: 1px solid #e8e8e8;
      padding: 7px 16px;
      font-size: 11px;
      color: #666;
      text-align: right;
    }
    .footer strong { color: #111; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔍 LinkedIn Keyword Finder</h1>
    <div class="tabs">
      <button class="tab-btn active" data-tab="results">Results</button>
      <button class="tab-btn"        data-tab="keywords">Manage Keywords</button>
    </div>
  </div>

  <!-- Results Tab -->
  <div id="tab-results" class="tab-content active">
    <div class="results-body" id="results-body">
      <div class="status">Loading…</div>
    </div>
    <div class="footer" id="results-footer"></div>
  </div>

  <!-- Keywords Tab -->
  <div id="tab-keywords" class="tab-content">
    <div class="kw-manage">
      <div class="kw-manage-list" id="kw-manage-list">
        <div class="status">Loading…</div>
      </div>
      <div class="add-row">
        <input type="text" id="kw-input" placeholder="e.g.  remote  or  author*" maxlength="30" />
        <button id="kw-add-btn">+ Add</button>
      </div>
      <div class="add-hint">* at the end = prefix match (e.g. sponsor* matches sponsorship)</div>
      <div class="error-msg" id="kw-error"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
